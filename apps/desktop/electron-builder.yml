appId: io.refine.desktop
productName: Refine
executableName: refine
artifactName: ${productName}-${version}-${arch}.${ext}
directories:
  output: dist
  buildResources: resources
files:
  - out/**
extraResources:
  - from: resources/tray
    to: tray
protocols:
  - name: Refine
    schemes:
      - refine
mac:
  target:
    - dmg
    - zip
  category: public.app-category.productivity
  icon: resources/icon.png
win:
  target:
    - nsis
  icon: resources/icon.png
linux:
  target:
    - AppImage
    - deb
  category: Utility
  icon: resources/icon.png
  mimeTypes:
    - x-scheme-handler/refine
